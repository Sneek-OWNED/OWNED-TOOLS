<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horloge Numérique - OWNED</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 0.95em;
        }

        .clocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .clock-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            color: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .clock-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .timezone-name {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .time-display {
            font-size: 3em;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            margin: 15px 0;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .date-display {
            font-size: 0.95em;
            opacity: 0.9;
            margin-top: 10px;
        }

        .controls {
            text-align: center;
            margin-bottom: 30px;
        }

        .add-timezone {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-right: 10px;
        }

        .add-timezone:hover {
            background: #764ba2;
        }

        .add-timezone:active {
            transform: scale(0.98);
        }

        .timezone-selector {
            padding: 10px;
            font-size: 1em;
            border: 2px solid #667eea;
            border-radius: 8px;
            cursor: pointer;
        }

        .remove-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            margin-top: 10px;
            transition: background 0.3s ease;
            width: 100%;
        }

        .remove-btn:hover {
            background: #ee5a52;
        }

        .footer {
            text-align: center;
            color: #999;
            font-size: 0.9em;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 2em;
            }

            .time-display {
                font-size: 2.2em;
            }

            .clocks-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⏰ Horloge Numérique</h1>
        <p class="subtitle">Livre des Tâches — OWNED TOOLS</p>

        <div class="controls">
            <select id="timezoneSelect" class="timezone-selector">
                <option value="">Sélectionner un fuseau horaire</option>
            </select>
            <button class="add-timezone" onclick="addTimezone()">+ Ajouter Fuseau Horaire</button>
        </div>

        <div class="clocks-grid" id="clocksContainer"></div>

        <div class="footer">
            Créé par Sneek / Noheal | Mis à jour automatiquement chaque seconde
        </div>
    </div>

    <script>
        const timezones = [
            { name: 'Paris', tz: 'Europe/Paris' },
            { name: 'Londres', tz: 'Europe/London' },
            { name: 'Tokyo', tz: 'Asia/Tokyo' },
            { name: 'New York', tz: 'America/New_York' },
            { name: 'Los Angeles', tz: 'America/Los_Angeles' },
            { name: 'Sydney', tz: 'Australia/Sydney' },
            { name: 'Dubai', tz: 'Asia/Dubai' },
            { name: 'Hong Kong', tz: 'Asia/Hong_Kong' },
            { name: 'Singapour', tz: 'Asia/Singapore' },
            { name: 'Istanbul', tz: 'Europe/Istanbul' },
            { name: 'Bangkok', tz: 'Asia/Bangkok' },
            { name: 'Mexico', tz: 'America/Mexico_City' },
            { name: 'Toronto', tz: 'America/Toronto' },
            { name: 'São Paulo', tz: 'America/Sao_Paulo' },
            { name: 'Moscou', tz: 'Europe/Moscow' }
        ];

        let selectedTimezones = ['Europe/Paris', 'America/New_York', 'Asia/Tokyo'];

        // Remplir le sélecteur
        function populateSelector() {
            const select = document.getElementById('timezoneSelect');
            timezones.forEach(tz => {
                const option = document.createElement('option');
                option.value = tz.tz;
                option.textContent = tz.name;
                select.appendChild(option);
            });
        }

        // Ajouter un fuseau horaire
        function addTimezone() {
            const select = document.getElementById('timezoneSelect');
            if (!select.value) {
                alert('Veuillez sélectionner un fuseau horaire');
                return;
            }
            if (!selectedTimezones.includes(select.value)) {
                selectedTimezones.push(select.value);
                updateClocks();
                select.value = '';
            } else {
                alert('Ce fuseau horaire est déjà affiché');
            }
        }

        // Retirer un fuseau horaire
        function removeTimezone(tz) {
            selectedTimezones = selectedTimezones.filter(t => t !== tz);
            updateClocks();
        }

        // Obtenir le nom du fuseau horaire
        function getTimezoneName(tz) {
            const tzObj = timezones.find(t => t.tz === tz);
            return tzObj ? tzObj.name : tz;
        }

        // Formater l'heure
        function formatTime(date) {
            return date.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        // Formater la date
        function formatDate(date) {
            return date.toLocaleDateString('fr-FR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }

        // Mettre à jour les horloges
        function updateClocks() {
            const container = document.getElementById('clocksContainer');
            container.innerHTML = '';

            selectedTimezones.forEach(tz => {
                const date = new Date().toLocaleString('fr-FR', { timeZone: tz });
                const tzDate = new Date(date);

                const card = document.createElement('div');
                card.className = 'clock-card';
                card.innerHTML = `
                    <div class="timezone-name">${getTimezoneName(tz)}</div>
                    <div class="time-display">${formatTime(tzDate)}</div>
                    <div class="date-display">${formatDate(tzDate)}</div>
                    <button class="remove-btn" onclick="removeTimezone('${tz}')">✕ Retirer</button>
                `;
                container.appendChild(card);
            });
        }

        // Initialiser et mettre à jour toutes les secondes
        populateSelector();
        updateClocks();
        setInterval(updateClocks, 1000);

        // Permettre d'ajouter avec Entrée
        document.getElementById('timezoneSelect').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addTimezone();
            }
        });
    </script>
</body>
</html>

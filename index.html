<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todolist - OWNED</title>
</head>
<body>
    <div>
        <h1>Todolist - OWNED</h1>
        <p>Livre des Tâches — Outils crée pour les membres de la Legion OWNED</p>
        <p>Créé par Sneek / Noheal</p>
    </div>

    <div>
        <h2>☀ Tâches Quotidiennes</h2>
        <p>0 / 0</p>
        <button>↺ Reset</button>
        <button>+ Ajouter</button>
    </div>

    <div>
        <h2>🌙 Tâches Hebdomadaires</h2>
        <p>0 / 0</p>
        <button>↺ Reset</button>
        <button>+ Ajouter</button>
    </div>

    <div>
        <button>⟳ Réinitialiser toutes les tâches</button>
    </div>

    <div>
        <h2>🔗 Liens Utiles</h2>
        <button>+ Ajouter un lien</button>
    </div>

    <div>
        <h2>📌 Notes</h2>
        <button>🗑 −</button>
    </div>

    <textarea placeholder="📝"></textarea>
</body>
</html>
